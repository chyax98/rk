name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  contracts:
    name: Contract Drift Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify contracts (76 checks)
        run: node --experimental-strip-types scripts/verify-contracts.ts

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Type check — shared
        run: cd packages/shared && npx tsc --noEmit

      - name: Type check — dsl
        run: cd packages/dsl && npx tsc --noEmit

      - name: Type check — blocks
        run: cd packages/blocks && npx tsc --noEmit
